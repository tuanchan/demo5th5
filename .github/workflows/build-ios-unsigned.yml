name: Build iOS unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - clean-main
      - clean-restructure

env:
  # pubspec.lock requires Flutter >=3.44.0 / Dart >=3.12.0.
  FLUTTER_VERSION: "3.44.0"
  IPA_NAME: flutterflashcard-unsigned.ipa

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Clean project
        run: flutter clean

      - name: Get packages from lockfile
        run: flutter pub get --enforce-lockfile

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Configure Flutter iOS release
        run: flutter build ios --config-only --release --no-codesign

      - name: Build iOS app unsigned
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Create unsigned IPA
        run: |
          rm -rf Payload "$IPA_NAME"
          mkdir -p Payload
          cp -R build/ios/DerivedData/Build/Products/Release-iphoneos/Runner.app Payload/Runner.app
          zip -qry "$IPA_NAME" Payload
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: flutterflashcard-unsigned-ipa
          path: ${{ env.IPA_NAME }}
